[advisories]
version = 2
yanked = "deny"
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    { crate = "hyper-tls", reason = "Keep kubeview on the rustls TLS stack." },
    { crate = "native-tls", reason = "Keep kubeview on the rustls TLS stack." },
    { crate = "openssl", reason = "Keep kubeview on the rustls TLS stack." },
    { crate = "openssl-sys", reason = "Keep kubeview on the rustls TLS stack." },
    { crate = "tokio-native-tls", reason = "Keep kubeview on the rustls TLS stack." },
]

[licenses]
version = 2
confidence-threshold = 0.8
unused-allowed-license = "deny"

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
]

[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
