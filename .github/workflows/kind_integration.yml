name: Kind integration tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  KUBEVIEW_RUN_KIND_INTEGRATION: "1"

jobs:
  kind-integration:
    name: Kind integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Setup rust toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: kind-integration-${{ runner.os }}-v1
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kubeview-integration
          wait: 120s
      - name: Verify kind cluster
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide
      - name: Run kind integration tests
        run: cargo test --test kind_integration -- --nocapture
